name: Deploy

on:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev zstd cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure -j4

  test-asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev zstd cmake

      - name: Configure
        run: cmake -B build_asan -DBUILD_TESTS=ON -DSANITIZE=ON

      - name: Build
        run: cmake --build build_asan

      - name: Test (ASAN + UBSan + LeakSanitizer)
        run: ctest --test-dir build_asan --output-on-failure -j4

  build:
    needs: [test, test-asan]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev cmake

      - name: Create Build Environment
        run: cmake -E make_directory ${{runner.workspace}}/build

      - name: Configure CMake
        working-directory: ${{runner.workspace}}/build
        run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: ${{runner.workspace}}/build
        run: cmake --build . --config Release

      - name: Create DEB Package
        id: create-deb-package
        working-directory: ${{runner.workspace}}/build
        run: cpack

      - name: Release DEB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF##*/}" ${{runner.workspace}}/build/*.deb
